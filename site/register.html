<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — SYNTH3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-body">

  <div class="auth-bg">
    <div class="grid-overlay"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <a href="index.html" class="auth-back">← SYNTH<span>3D</span></a>

  <div class="auth-container">
    <div class="auth-card">

      <div class="auth-header">
        <div class="auth-logo">SYNTH<span>3D</span></div>
        <h1>Create your account</h1>
        <p>Start generating 3D worlds for free</p>
      </div>

      <div class="auth-alert" id="authAlert" style="display:none;"></div>

      <form class="auth-form" id="registerForm" novalidate>

        <div class="field-group">
          <label for="username">Username</label>
          <div class="field-wrap">
            <input
              type="text"
              id="username"
              placeholder="yourname"
              autocomplete="username"
              required
              minlength="3"
            />
            <span class="field-icon">◉</span>
          </div>
          <p class="field-error" id="usernameError"></p>
        </div>

        <div class="field-group">
          <label for="email">Email</label>
          <div class="field-wrap">
            <input
              type="email"
              id="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
            <span class="field-icon">✉</span>
          </div>
          <p class="field-error" id="emailError"></p>
        </div>

        <div class="field-group">
          <label for="password">Password</label>
          <div class="field-wrap">
            <input
              type="password"
              id="password"
              placeholder="Min. 8 characters"
              autocomplete="new-password"
              required
              minlength="8"
            />
            <button type="button" class="field-icon field-icon-btn" id="togglePw" aria-label="Show password">👁</button>
          </div>
          <p class="field-error" id="passwordError"></p>
          <!-- Password strength bar -->
          <div class="pw-strength" id="pwStrength" style="display:none;">
            <div class="pw-strength-bar">
              <div class="pw-strength-fill" id="pwFill"></div>
            </div>
            <span class="pw-strength-label" id="pwLabel">Weak</span>
          </div>
        </div>

        <div class="field-group">
          <label for="confirmPassword">Confirm password</label>
          <div class="field-wrap">
            <input
              type="password"
              id="confirmPassword"
              placeholder="••••••••"
              autocomplete="new-password"
              required
            />
            <span class="field-icon" id="confirmIcon"></span>
          </div>
          <p class="field-error" id="confirmError"></p>
        </div>

        <!-- Terms -->
        <label class="checkbox-label">
          <input type="checkbox" id="terms" required />
          <span class="checkbox-custom"></span>
          I agree to the <a href="#" class="inline-link">Terms of Service</a> and <a href="#" class="inline-link">Privacy Policy</a>
        </label>
        <p class="field-error" id="termsError"></p>

        <button type="submit" class="auth-submit" id="submitBtn">
          <span id="submitText">Create account</span>
          <span class="auth-spinner" id="submitSpinner" style="display:none;"></span>
        </button>

      </form>

      <div class="auth-divider"><span>or</span></div>

      <div class="auth-oauth">
        <button class="oauth-btn" id="googleBtn" type="button">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
            <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
        <button class="oauth-btn" id="githubBtn" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          Continue with GitHub
        </button>
      </div>

      <p class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </p>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script>
    initRegisterPage();
  </script>
</body>
</html>
